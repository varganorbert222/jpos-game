<nav class="dock" data-region="dock">
  @if (pageCount() > 1) {
    <button
      type="button"
      class="jp-btn dock-page-btn"
      (click)="prevPage()"
      [disabled]="!canPagePrev()"
      aria-label="Previous dock page"
    >
      ‹
    </button>
  }
  @for (a of visibleApps(); track a.id) {
    <button
      type="button"
      class="jp-btn jp-dock-btn"
      [attr.data-app]="a.id"
      [attr.data-in-memory]="isInMemory(a.id)"
      [attr.data-open]="isOpen(a.id)"
      [attr.data-minimized]="isMinimized(a.id)"
      [attr.data-focused]="isFocused(a.id)"
      [class.jp-dock-btn--highlight]="guidance.highlightDockApp() === a.id"
      [attr.title]="dockTitle(a.id)"
      (click)="open(a.id)"
    >
      <app-os-icon [name]="a.id" />
      <span>{{ a.label }}</span>
      @if (a.id === 'mail' && mail.hasNewMail() && !isOpen(a.id)) {
        <span class="dock-mail-alert" title="New mail" aria-label="New mail">●</span>
      }
      @if (isOpen(a.id)) {
        <span class="dock-indicator dock-indicator--active" aria-hidden="true"
          >■</span
        >
      } @else if (isMinimized(a.id)) {
        <span
          class="dock-indicator dock-indicator--minimized"
          aria-hidden="true"
          >■</span
        >
      }
    </button>
  }
  @if (pageCount() > 1) {
    <button
      type="button"
      class="jp-btn dock-page-btn"
      (click)="nextPage()"
      [disabled]="!canPageNext()"
      aria-label="Next dock page"
    >
      ›
    </button>
  }
</nav>
