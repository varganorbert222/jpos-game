<section class="jp-panel logs-panel" data-region="logs-actions">
  <h2 class="jp-panel__title">
    <app-os-icon name="terminal" /> NEXT COMMAND
  </h2>
  <app-jp-section-loader sectionId="next_command" class="logs-panel__next-body">
    <p class="logs-panel__next-warn jp-warn">
      Advisory: suggestions may worsen conditions.
    </p>
    <ul class="logs-panel__next-list">
      @for (s of nextSuggestions(); track s.usage) {
        <li>
          <span class="logs-panel__next-cmd">{{ s.usage }}</span>
          <span class="logs-panel__next-note">— {{ s.note }}</span>
        </li>
      }
    </ul>
  </app-jp-section-loader>

  <h2 class="jp-panel__title jp-panel__title--sub">OPERATOR ACTIONS</h2>
  <div class="actions-wrap">
    <div class="actions actions--matrix">
      @for (a of operatorActions; track a.type) {
        <button
          type="button"
          class="jp-btn"
          [class.jp-warn]="a.warn"
          [class.jp-critical]="a.critical"
          [disabled]="isActionBlocked(a)"
          (click)="runAction(a)"
        >
          {{ a.label }}
        </button>
      }
    </div>
  </div>

  <h2 class="jp-panel__title jp-panel__title--sub">COMMAND LINE</h2>
  <app-compact-terminal class="logs-panel__terminal" />
</section>
