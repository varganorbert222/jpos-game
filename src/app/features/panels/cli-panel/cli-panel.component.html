<section class="jp-panel cli-panel" data-region="cli">
  <h2 class="jp-panel__title">COMMAND INTERFACE</h2>

  <app-jp-section-loader sectionId="next_command" class="cli-next-loader">
    <div class="cli-next" data-block="next-command">
      <div class="cli-next__label jp-info">NEXT COMMAND</div>
      <p class="cli-next__warn jp-warn">
        Advisory: options below are possibilities only — they may worsen conditions.
      </p>
      <ul class="cli-next__list">
        @for (s of nextSuggestions(); track s.usage) {
          <li>
            <span class="cli-next__cmd">{{ s.usage }}</span>
            <span class="cli-next__note">— {{ s.note }}</span>
          </li>
        }
      </ul>
    </div>
  </app-jp-section-loader>

  <pre
    class="cli-screen jp-terminal-inset jp-terminal-viewport"
    data-block="output"
    jpRetroScroll
    jpTerminalAutoscroll
  >{{ outputText() }}</pre>

  <div class="cli-prompt" data-block="input" jpTerminalPrompt>
    <span class="jp-terminal-prompt__prefix cli-prompt__chev">&gt;</span>
    <input
      #cmdInput
      class="jp-terminal-prompt__input cli-input"
      autocomplete="off"
      spellcheck="false"
      (keydown)="onInputKeydown($event, cmdInput)"
      (keydown.enter)="onSubmit(cmdInput)"
    />
  </div>

  <div class="cli-actions" data-block="quick-actions">
    <!-- FENCE OPERATIONS -->
    <button type="button" class="jp-btn" (click)="onQuickAction('reset_fence', cmdInput)">
      RESET FENCE
    </button>

    <button
      type="button"
      class="jp-btn"
      (click)="onQuickAction('increase_voltage', cmdInput)"
    >
      VOLT+ FENCE
    </button>

    <button
      type="button"
      class="jp-btn"
      (click)="onQuickAction('decrease_voltage', cmdInput)"
    >
      VOLT- FENCE
    </button>

    <!-- SECURITY TEAMS -->
    <button type="button" class="jp-btn" (click)="onQuickAction('dispatch_patrol', cmdInput)">
      PATROL
    </button>

    <!-- GENERATORS -->
    <button
      type="button"
      class="jp-btn"
      (click)="onQuickAction('generator_restart', cmdInput)"
    >
      GEN RESTART
    </button>

    <!-- CAMERAS -->
    <button type="button" class="jp-btn" (click)="onQuickAction('cam_reboot', cmdInput)">
      CAM REBOOT
    </button>

    <!-- POWER MGMT -->
    <button type="button" class="jp-btn" (click)="onQuickAction('power_reroute', cmdInput)">
      POWER REROUTE
    </button>

    <!-- EMERGENCY OPS -->
    <button
      type="button"
      class="jp-btn"
      (click)="onQuickAction('emergency_venting', cmdInput)"
    >
      VENT
    </button>

    <button
      type="button"
      class="jp-btn"
      (click)="onQuickAction('lethal_authorization', cmdInput)"
    >
      LAUTH
    </button>

    <!-- SYSTEM OPS -->
    <button
      type="button"
      class="jp-btn"
      (click)="onQuickAction('system_hard_reboot', cmdInput)"
    >
      SYSREBOOT
    </button>
  </div>
</section>
