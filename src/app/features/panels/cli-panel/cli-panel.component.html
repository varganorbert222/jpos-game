<section class="jp-panel cli-panel" data-region="cli">
  <h2 class="jp-panel__title">COMMAND INTERFACE</h2>

  <div class="cli-commands" data-block="command-list">
    <div class="cli-commands__label jp-info">AVAILABLE COMMANDS</div>
    <ul class="jp-cli-command-list">
      @for (c of commands; track c.name) {
        <li [attr.data-cmd]="c.name">{{ c.usage }} — {{ c.summary }}</li>
      }
    </ul>
  </div>

  <pre class="cli-screen jp-terminal-inset" data-block="output">{{
    outputText()
  }}</pre>

  <div class="cli-prompt" data-block="input">
    <span class="cli-prompt__chev">&gt;</span>
    <input
      #cmdInput
      class="jp-input cli-input"
      autocomplete="off"
      spellcheck="false"
      (keydown.enter)="onSubmit(cmdInput)"
    />
    <span class="jp-terminal-cursor" aria-hidden="true"></span>
  </div>

  <div class="cli-actions" data-block="quick-actions">
    <!-- FENCE OPERATIONS -->
    <button type="button" class="jp-btn" (click)="runAction('reset_fence')">
      RESET FENCE
    </button>

    <button
      type="button"
      class="jp-btn"
      (click)="runAction('increase_voltage')"
    >
      VOLT+ FENCE
    </button>

    <!-- SECURITY TEAMS -->
    <button type="button" class="jp-btn" (click)="runAction('dispatch_patrol')">
      PATROL
    </button>

    <!-- GENERATORS -->
    <button
      type="button"
      class="jp-btn"
      (click)="runAction('generator_restart')"
    >
      GEN RESTART
    </button>

    <!-- CAMERAS -->
    <button type="button" class="jp-btn" (click)="runAction('cam_reboot')">
      CAM REBOOT
    </button>

    <!-- POWER MGMT -->
    <button type="button" class="jp-btn" (click)="runAction('power_reroute')">
      POWER REROUTE
    </button>

    <!-- EMERGENCY OPS -->
    <button
      type="button"
      class="jp-btn"
      (click)="runAction('emergency_venting')"
    >
      VENT
    </button>

    <button
      type="button"
      class="jp-btn"
      (click)="runAction('lethal_authorization')"
    >
      LAUTH
    </button>

    <!-- SYSTEM OPS -->
    <button
      type="button"
      class="jp-btn"
      (click)="runAction('system_hard_reboot')"
    >
      SYSREBOOT
    </button>
  </div>
</section>
